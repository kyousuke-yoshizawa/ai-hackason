# sync-notion.yml
# PRがmainにマージされた際、実装ログをNotionデータベースに自動追記するワークフロー
#
# 事前準備:
#   以下のSecretsをリポジトリに登録しておくこと（references/notion-database-config.md参照）
#   - NOTION_API_KEY
#   - NOTION_DB_IMPL_LOG
#
# 配置場所: .github/workflows/sync-notion.yml としてリポジトリ直下に配置する

name: Sync Notion on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  sync-notion:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post to Notion (実装ログDB)
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DB_IMPL_LOG: ${{ secrets.NOTION_DB_IMPL_LOG }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          curl -X POST "https://api.notion.com/v1/pages" \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            --data @- << JSON
          {
            "parent": { "database_id": "$NOTION_DB_IMPL_LOG" },
            "properties": {
              "PRタイトル": {
                "title": [ { "text": { "content": "$PR_TITLE" } } ]
              },
              "担当者": {
                "rich_text": [ { "text": { "content": "$PR_AUTHOR" } } ]
              },
              "PRリンク": {
                "url": "$PR_URL"
              }
            }
          }
          JSON

      - name: Notify on failure
        if: failure()
        run: echo "Notion同期に失敗しました。Secretsの設定を確認してください（NOTION_API_KEY / NOTION_DB_IMPL_LOG）。"
